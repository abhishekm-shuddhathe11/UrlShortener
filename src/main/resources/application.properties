spring.application.name=urlshortener

spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Run application on alternate port to avoid conflicts during development
server.port=9090

# Configurable in-memory rate limiting
app.rate-limit.enabled=true
app.rate-limit.max-requests=5 #his is the maximum number of requests allowed within the specified time window(For testing Pupose, I Have Made it 5 U can make it 120 0r 1000 as per your requirement)
app.rate-limit.window=1m  #this is the time window for rate limiting. In this case, it's set to 1 minute. You can adjust this value as needed (e.g., 30s for 30 seconds, 5m for 5 minutes, etc.).